backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

site_url: https://fastidious-malasada-8c0a34.netlify.app
show_preview_links: true

collections:
  - name: "config"
    label: "⚙️ Configuración General"
    files:
      - name: "site"
        label: "Configuración del Sitio"
        file: "src/content/config/site.json"
        fields:
          - { label: "Código de Acceso", name: "accessCode", widget: "string", hint: "Contraseña para acceder al portfolio" }
          - { label: "Título del Sitio", name: "siteTitle", widget: "string" }
          - { label: "Subtítulo", name: "siteSubtitle", widget: "string" }
          - { label: "Email de Contacto", name: "email", widget: "string" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
          - { label: "Behance URL", name: "behance", widget: "string", required: false }
          - { label: "─── 🏠 HERO ───────────────", name: "heroSep", widget: "hidden", default: "" }
          - { label: "Hero — Línea 1 (pequeña)", name: "heroLine1", widget: "string", hint: "Ej: Hola! soy" }
          - { label: "Hero — Nombre (grande)", name: "heroLine2", widget: "string", hint: "Ej: Sandra González" }
          - { label: "Hero — Rol", name: "heroLine3", widget: "string", hint: "Ej: product designer" }
          - { label: "Hero — Descripción", name: "heroLine4", widget: "text", hint: "Párrafo bajo el nombre" }
          - { label: "Hero — Imagen de fondo", name: "heroBgImage", widget: "image", required: false, hint: "Imagen detrás del texto. Déjalo vacío para fondo liso." }
          - { label: "─── 👩 SOBRE MÍ ────────────", name: "aboutSep", widget: "hidden", default: "" }
          - { label: "Sobre mí — Intro", name: "aboutIntro", widget: "text", hint: "Primera frase destacada" }
          - { label: "Sobre mí — Texto", name: "aboutBody", widget: "text", hint: "Párrafo principal" }
          - { label: "Sobre mí — Foto", name: "aboutImage", widget: "image", required: false, hint: "Tu foto de perfil" }
          - { label: "─── 📬 CONTACTO ────────────", name: "contactSep", widget: "hidden", default: "" }
          - { label: "Contacto — Texto intro", name: "contactIntro", widget: "string", hint: "Frase bajo el título de contacto" }

  - name: "trabajos"
    label: "💼 Trabajos"
    folder: "src/content/trabajos"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{year}}"
    preview_path: "trabajo/{{slug}}"
    fields:
      - { label: "Título del Proyecto", name: "title", widget: "string" }
      - { label: "Categoría / Disciplina", name: "categoria", widget: "string", hint: "Ej: UI Design · UX Research" }
      - { label: "Año", name: "year", widget: "number", value_type: "int" }
      - { label: "⭐ Proyecto Destacado (Jumbo)", name: "featured", widget: "boolean", default: false, hint: "Si está activo ocupa todo el ancho de la página de inicio" }
      - { label: "Imagen de Portada", name: "cover", widget: "image", hint: "JPG, PNG, WebP o GIF animado" }
      - { label: "Orden de aparición", name: "order", widget: "number", value_type: "int", default: 0, hint: "Número menor = aparece antes" }
      - { label: "Borrador (oculto)", name: "draft", widget: "boolean", default: false }
      - { label: "🎨 Color del topbar", name: "navColor", widget: "color", required: false, hint: "Color de fondo de la barra de navegación al ver este proyecto. Déjalo vacío para usar el color por defecto." }
      - { label: "Cliente", name: "cliente", widget: "string", required: false, hint: "Nombre del cliente o empresa" }
      - { label: "Rol", name: "rol", widget: "string", required: false, hint: "Tu rol en el proyecto. Ej: Lead UX Designer" }

      - label: "Contenido del artículo"
        name: "bloques"
        widget: "list"
        collapsed: false
        required: false
        hint: "Añade bloques de texto e imágenes/GIFs en el orden que quieras. Arrastra para reordenar."
        types:
          - label: "📝 Bloque de texto"
            name: "texto"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Texto", name: "texto", widget: "markdown", hint: "Puedes usar títulos, negritas, listas..." }

          - label: "🖼 Imagen o GIF"
            name: "imagen"
            widget: "object"
            collapsed: false
            fields:
              - { label: "Archivo", name: "imagen", widget: "image", hint: "JPG, PNG, WebP o GIF animado — los GIFs se reproducen automáticamente en la web" }
              - { label: "Pie de foto (opcional)", name: "caption", widget: "string", required: false }

  - name: "servicios"
    label: "🛠 Servicios"
    folder: "src/content/servicios"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nombre del Servicio", name: "title", widget: "string" }
      - { label: "Descripción", name: "descripcion", widget: "text" }
      - label: "Icono"
        name: "icono"
        widget: "select"
        options:
          - { label: "🔍 Research / Búsqueda", value: "research" }
          - { label: "🖥 UI Design", value: "ui" }
          - { label: "⚡ Prototipado", value: "prototype" }
          - { label: "⭐ Brand Identity", value: "brand" }
      - { label: "Orden", name: "order", widget: "number", value_type: "int", default: 0 }
